# Config ported from Ghostty (ghostty/config)

# ═══════════════════════════════════════════════════════════════
# One Double Dark Theme
# ═══════════════════════════════════════════════════════════════
foreground            #dbdfe5
background            #282c34
selection_background  #585b70
selection_foreground  #cdd6f4
cursor                #f5e0dc
cursor_text_color     #cdd6f4

# black
color0  #3d4452
color8  #525d6f
# red
color1  #f16372
color9  #ff777b
# green
color2  #8cc570
color10 #82d882
# yellow
color3  #ecbe70
color11 #f5c065
# blue
color4  #3fb1f5
color12 #6dcaff
# magenta
color5  #d373e3
color13 #ff7bf4
# cyan
color6  #17b9c4
color14 #00e5fb
# white
color7  #dbdfe5
color15 #f7f9fc

# ═══════════════════════════════════════════════════════════════
# Font Configuration
# ═══════════════════════════════════════════════════════════════
font_family       JetBrainsMono Nerd Font
font_size         14
# JetBrains Mono ligatures (+calt, +liga) are on by default in kitty.
disable_ligatures never

# ═══════════════════════════════════════════════════════════════
# Window Settings
# ═══════════════════════════════════════════════════════════════
window_padding_width    8
background_opacity       1
background_blur          1
hide_window_decorations  no

# ═══════════════════════════════════════════════════════════════
# Terminal Behavior
# ═══════════════════════════════════════════════════════════════
scrollback_lines        10000
cursor_shape            beam
cursor_blink_interval   -1
shell_integration       enabled

# ═══════════════════════════════════════════════════════════════
# Clipboard Settings
# ═══════════════════════════════════════════════════════════════
copy_on_select     clipboard
clipboard_control  write-clipboard write-primary read-clipboard read-primary

# ═══════════════════════════════════════════════════════════════
# Mouse & Link Behavior
# ═══════════════════════════════════════════════════════════════
mouse_hide_wait   3.0
detect_urls       yes
open_url_with      default
# Cmd+click opens URLs in the default browser (macOS default behavior, made explicit)
mouse_map cmd+left click ungrabbed mouse_handle_click selection link

# ═══════════════════════════════════════════════════════════════
# macOS-Specific Settings
# ═══════════════════════════════════════════════════════════════
macos_option_as_alt              yes
macos_quit_when_last_window_closed no

# ═══════════════════════════════════════════════════════════════
# Confirmation & Safety
# ═══════════════════════════════════════════════════════════════
confirm_os_window_close 0

# ═══════════════════════════════════════════════════════════════
# Keybinds
# ═══════════════════════════════════════════════════════════════
map shift+enter send_text all \x1b\r
# Option+Arrow word movement (macOS behavior) — sends readline escape sequences
# Option+Left  -> move cursor back one word (ESC+b)
# Option+Right -> move cursor forward one word (ESC+f)
map alt+left  send_text all \x1bb
map alt+right send_text all \x1bf
# Option+Backspace deletes one word back (ESC+\x7f)
map alt+backspace send_text all \x1b\x7f
# Cmd+Arrow line navigation and Cmd+Backspace delete-to-line-start.
# Send custom escape sequences (not raw Ctrl+A/E/U) so tmux and nvim
# do not intercept them as their own shortcuts. zsh binds these via
# bindkey in .zshrc_sourced/.local — see zsh/.zshrc_sourced/.local.
map cmd+left  send_text all \x1b[1;9D
map cmd+right send_text all \x1b[1;9C
map cmd+backspace send_text all \x1b[1;9\x7f
# Cmd+Up/Down scroll to top/bottom of scrollback
map cmd+up    scroll_to_top
map cmd+down  scroll_to_bottom

# ═══════════════════════════════════════════════════════════════
# Startup
# ═══════════════════════════════════════════════════════════════
# Launch into tmux (attach to session "adryanev" or create it).
# The launcher lives at scripts/start-tmux.sh in the dotfiles repository and is
# symlinked into ~/Scripts by deploy-dotfiles.sh. The path is absolute because
# kitty does not expand ~ or $HOME in this option. The script falls back to a
# login shell on its own if tmux is unavailable.
shell /Users/adryanev/Scripts/start-tmux.sh
